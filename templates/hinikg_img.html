{%load static%}
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গ্যালারি - মুন্সীগঞ্জ পলিটেকনিক রোভার স্কাউট</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{%static 'style.css'%}">

    <style>
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            animation: fadeIn .3s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .lightbox-content {
            position: relative;
            text-align: center;
            max-width: 90%;
            max-height: 90%;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 10px;
        }

        .lightbox .close {
            position: absolute;
            top: -45px;
            right: 0;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        .image-caption {
            color: #fff;
            margin-top: 15px;
            font-size: 18px;
        }

        .hero .container {
            padding-top: 30px;
            padding-bottom: 60px;
            text-align: center;
            color: white;
        }
    </style>
</head>

<body>
{%include 'nav.html'%}

{% if hero %}
<section class="hero" style="background-image: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)), url('{{ hero.image.url }}');">
    <div class="container">
        <h2>{{ hero.title }}</h2>
        <p>{{ hero.description }}</p>
    </div>
</section>
{% endif %}

<section class="section">
    <div class="container">

        <div id="loadingState" class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <p>গ্যালারি লোড হচ্ছে...</p>
        </div>

        <div id="errorState" class="error-message" style="display:none;">
            <i class="fas fa-exclamation-circle"></i>
            <p>ডেটা লোড করতে সমস্যা হয়েছে।</p>
        </div>
    </div>
</section>

<section class="section" id="imageGallerySection" style="display:none;">
    <div class="container">
        <div class="section-title">
            <h2>ছবি গ্যালারি</h2>
        </div>

        <div class="gallery-grid" id="imageGallery"></div>
    </div>
</section>

{%include 'footer.html'%}


<script src="{%static 'js/main.js'%}"></script>

<script>
    const STATIC_URL = "{% static '' %}";

    function imageUrl(path) {
        if (!path) return STATIC_URL + "images/default-image.png";

        if (
            path.startsWith("http://") ||
            path.startsWith("https://") ||
            path.startsWith("/static/") ||
            path.startsWith("/media/")
        ) {
            return path;
        }

        path = path.replace(/^(\.\.\/)+/, "");
        path = path.replace(/^\.?\//, "");

        return STATIC_URL + path;
    }

    let galleryData = {};
    let lightboxInitialized = false;
    const newImagesData = {{ new_images_json|safe }};

    async function loadGalleryData() {
        try {

            const response = await fetch("{% static 'data/hiking-data.json' %}");

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            galleryData = await response.json();

            if (!galleryData.images) galleryData.images = [];

            // New DB images shown FIRST, old JSON images after
            galleryData.images = newImagesData.concat(galleryData.images);

            buildGallery();

            const loading = document.getElementById("loadingState");
            if (loading) loading.style.display = "none";

            const error = document.getElementById("errorState");
            if (error) error.style.display = "none";

            const gallery = document.getElementById("imageGallerySection");
            if (gallery) gallery.style.display = "block";

            if (!lightboxInitialized) {
                enableLightbox();
                lightboxInitialized = true;
            }

        } catch (err) {

            console.error("Gallery Error:", err);

            const loading = document.getElementById("loadingState");
            if (loading) loading.style.display = "none";

            const error = document.getElementById("errorState");
            if (error) error.style.display = "block";
        }
    }

    function buildGallery() {

        const grid = document.getElementById("imageGallery");

        if (!grid) return;

        grid.innerHTML = "";

        const images = galleryData.images || [];

        const count = document.getElementById("imageCount");
        if (count) count.textContent = images.length;

        images.forEach(item => {

            const div = document.createElement("div");
            div.className = "gallery-item";

            div.innerHTML = `
                <img
                    src="${imageUrl(item.url)}"
                    alt="${item.alt || ''}"
                    loading="lazy"
                    onerror="this.src='${STATIC_URL}images/default-image.png'">

                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                </div>
            `;

            grid.appendChild(div);

        });

    }

    function enableLightbox() {

        document.addEventListener("click", function (e) {

            const item = e.target.closest(".gallery-item");

            if (!item) return;

            const img = item.querySelector("img");

            const overlay = document.createElement("div");
            overlay.className = "lightbox";

            overlay.innerHTML = `
                <div class="lightbox-content">
                    <span class="close">&times;</span>
                    <img src="${img.src}" alt="${img.alt}">
                    <div class="image-caption">${img.alt}</div>
                </div>
            `;

            document.body.appendChild(overlay);

            overlay.querySelector(".close").onclick = () => overlay.remove();

            overlay.onclick = function (ev) {
                if (ev.target === overlay) {
                    overlay.remove();
                }
            };

            function esc(ev) {
                if (ev.key === "Escape") {
                    overlay.remove();
                    document.removeEventListener("keydown", esc);
                }
            }

            document.addEventListener("keydown", esc);

        });

    }

    document.addEventListener("DOMContentLoaded", loadGalleryData);
</script>

</body>
</html>
