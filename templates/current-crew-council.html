{% load static %}
<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>বর্তমান ক্রু কাউন্সিল - মুন্সীগঞ্জ পলিটেকনিক রোভার স্কাউট</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'style.css' %}" />
    <style>
      @media (max-width: 768px) {
        .hero {
          padding: 80px 0;
          min-height: 50vh;
          background-attachment: scroll;
        }

        .hero h2 {
          font-size: 1.8rem;
          margin-bottom: 12px;
        }

        .hero p {
          font-size: 1rem;
          margin-bottom: 25px;
        }

        .hero {
          background-size: cover;
          background-position: center center;
        }
      }

      @media (max-width: 576px) {
        .hero {
          padding: 60px 0;
          min-height: 40vh;
        }

        .hero h2 {
          font-size: 1.6rem;
        }

        .hero p {
          font-size: 0.95rem;
        }

        .btn {
          padding: 12px 25px;
          font-size: 0.95rem;
        }
      }

      @media (max-width: 375px) {
        .hero {
          padding: 50px 0;
          min-height: 35vh;
        }

        .hero h2 {
          font-size: 1.4rem;
        }
      }
    </style>
  </head>
  <body>
    {% include 'nav.html' %}

    <section
      class="hero"
      id="hero"
      style="
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url('{% static 'images/1.jpg'%}');
      "
    >
      <div class="container">
        <h2 id="council-name">বর্তমান ক্রু কাউন্সিল</h2>
        <p id="council-year">
          N/A শিক্ষাবর্ষের নির্বাচিত ক্রু কাউন্সিল সদস্যগণ
        </p>
      </div>
    </section>

    <!-- Council Members -->
    <section class="section">
      <div class="container">
        <div class="section-title">
          <h2>ক্রু কাউন্সিল সদস্যগণ</h2>
        </div>

        <div id="senior-rover" class="team-grid-top"></div>

        <div id="rover-mates" class="team-grid" style="margin-top: 40px"></div>

        <div
          id="assistant-rover-mates"
          class="team-grid"
          style="margin-top: 40px"
        ></div>
      </div>
    </section>

    {% include 'footer.html' %}

    <!-- Script -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        try {
          const data = {{ council_json|safe }};

          if (!data || Object.keys(data).length === 0) {
            document.getElementById("council-name").textContent = "কোনো কাউন্সিল পাওয়া যায়নি";
            document.getElementById("council-year").textContent = "";
            return;
          }

          // Base static URL
          const STATIC_URL = "{% static '' %}";

          // Convert relative image path to static/media URL
          function imageUrl(path) {
            if (!path) return "";

            if (
              path.startsWith("http") ||
              path.startsWith("/static/") ||
              path.startsWith("/media/")
            ) {
              return path;
            }

            path = path.replace(/^(\.\.\/)+/, "");
            path = path.replace(/^\.?\//, "");

            return STATIC_URL + path;
          }

          // Hero
          document.getElementById("council-name").textContent = data.name || "";
          document.getElementById("council-year").textContent =
            `${data.year || ""} শিক্ষাবর্ষের নির্বাচিত ক্রু কাউন্সিল সদস্যগণ`;

          // Senior Rover
          const senior = data.seniorRover || {};

          document.getElementById("senior-rover").innerHTML = `
            <div class="team-member-top">
                <div class="member-img">
                    <img src="${imageUrl(senior.image)}" alt="${senior.name || ''}">
                </div>
                <div class="member-info">
                    <h3>${senior.name || 'N/A'}</h3>
                    <p class="member-role" style="color:#c1121f;">${senior.responsibility || ''}</p>
                    <p>ডিপার্টমেন্ট: ${senior.department || 'N/A'}</p>
                    <p>উপদল: ${senior.subgroup || 'N/A'}</p>
                </div>
            </div>
        `;

          // Rover Mates
          document.getElementById("rover-mates").innerHTML = (
            data.roverMates || []
          )
            .map(
              (mate) => `
                <div class="team-member">
                    <div class="member-img">
                        <img src="${imageUrl(mate.image)}" alt="${mate.name}">
                    </div>
                    <div class="member-info">
                        <h3>${mate.name}</h3>
                        <p class="member-role">${mate.responsibility}</p>
                        <p>ডিপার্টমেন্ট: ${mate.department}</p>
                        <p>উপদল: ${mate.subgroup}</p>
                    </div>
                </div>
            `,
            )
            .join("");

          // Assistant Rover Mates
          document.getElementById("assistant-rover-mates").innerHTML = (
            data.assistantRoverMates || []
          )
            .map(
              (a) => `
                <div class="team-member">
                    <div class="member-img">
                        <img src="${imageUrl(a.image)}" alt="${a.name}">
                    </div>
                    <div class="member-info">
                        <h3>${a.name}</h3>
                        <p class="member-role">${a.responsibility}</p>
                        <p>ডিপার্টমেন্ট: ${a.department}</p>
                        <p>উপদল: ${a.subgroup}</p>
                    </div>
                </div>
            `,
            )
            .join("");
        } catch (err) {
          console.error(err);
        }
      });
    </script>
    <script src="{% static 'js/main.js'%}"></script>
  </body>
</html>
