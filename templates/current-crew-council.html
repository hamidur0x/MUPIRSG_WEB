    <!-- Script -->
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const response = await fetch(
            "{% static 'data/current-council.json' %}",
          );

          if (!response.ok) {
            throw new Error("Failed to load JSON: " + response.status);
          }

          const data = await response.json();

          // Base static URL
          const STATIC_URL = "/static/";

          // Convert relative image path to static URL
          function imageUrl(path) {
            if (!path) return "";

            // Already absolute
            if (path.startsWith("http") || path.startsWith("/static/")) {
              return path;
            }

            // Remove ../ or ./
            path = path.replace(/^(\.\.\/)+/, "");
            path = path.replace(/^\.?\//, "");

            return STATIC_URL + path;
          }

          // Hero
          document.getElementById("council-name").textContent = data.name;
          document.getElementById("council-year").textContent =
            `${data.year} শিক্ষাবর্ষের নির্বাচিত ক্রু কাউন্সিল সদস্যগণ`;

          // Senior Rover
          const senior = data.seniorRover;

          document.getElementById("senior-rover").innerHTML = `
            <div class="team-member-top">
                <div class="member-img">
                    <img src="${imageUrl(senior.image)}" alt="${senior.name}">
                </div>
                <div class="member-info">
                    <h3>${senior.name}</h3>
                    <p class="member-role" style="color:#c1121f;">${senior.responsibility}</p>
                    <p>ডিপার্টমেন্ট: ${senior.department}</p>
                    <p>উপদল: ${senior.subgroup}</p>
                </div>
            </div>
        `;

          // Rover Mates
          document.getElementById("rover-mates").innerHTML = (
            data.roverMates || []
          )
            .map(
              (mate) => `
                <div class="team-member">
                    <div class="member-img">
                        <img src="${imageUrl(mate.image)}" alt="${mate.name}">
                    </div>
                    <div class="member-info">
                        <h3>${mate.name}</h3>
                        <p class="member-role">${mate.responsibility}</p>
                        <p>ডিপার্টমেন্ট: ${mate.department}</p>
                        <p>উপদল: ${mate.subgroup}</p>
                    </div>
                </div>
            `,
            )
            .join("");

          // Assistant Rover Mates
          document.getElementById("assistant-rover-mates").innerHTML = (
            data.assistantRoverMates || []
          )
            .map(
              (a) => `
                <div class="team-member">
                    <div class="member-img">
                        <img src="${imageUrl(a.image)}" alt="${a.name}">
                    </div>
                    <div class="member-info">
                        <h3>${a.name}</h3>
                        <p class="member-role">${a.responsibility}</p>
                        <p>ডিপার্টমেন্ট: ${a.department}</p>
                        <p>উপদল: ${a.subgroup}</p>
                    </div>
                </div>
            `,
            )
            .join("");

          // Achievements (optional)
          if (data.achievements && document.getElementById("achievements")) {
            document.getElementById("achievements").innerHTML =
              data.achievements
                .map(
                  (act) => `
                    <div class="activity-card">
                        <div class="activity-icon">
                            <i class="${act.icon}"></i>
                        </div>
                        <div class="activity-content">
                            <h3>${act.title}</h3>
                            <p>${act.description}</p>
                        </div>
                    </div>
                `,
                )
                .join("");
          }
        } catch (err) {
          console.error(err);
        }
      });
    </script>
    <script src="{% static 'js/main.js'%}"></script>
